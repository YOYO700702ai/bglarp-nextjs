<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Vibe coding + 動態題庫 - AI線上工作坊</title>
  <desc id="desc">一張以 AI 編程、動態題庫、遊戲化評量與奇幻世界為主題的線上工作坊宣傳海報。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102033"/>
      <stop offset="0.42" stop-color="#183952"/>
      <stop offset="1" stop-color="#0f291f"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd56a"/>
      <stop offset="1" stop-color="#ff8f5b"/>
    </linearGradient>
    <linearGradient id="portal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7af7ff"/>
      <stop offset="0.5" stop-color="#7ee081"/>
      <stop offset="1" stop-color="#f7d56b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5da"/>
      <stop offset="1" stop-color="#ffe8a6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#071018" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .zh {
        font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", "Heiti TC", Arial, sans-serif;
      }
      .mono {
        font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
      }
      .small { font-size: 27px; }
      .body { font-size: 35px; line-height: 1.52; }
      .accent { fill: #fff0b8; }
      .cream { fill: #fff9e9; }
      .ink { fill: #183047; }
    </style>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>

  <g opacity="0.72">
    <circle cx="880" cy="180" r="190" fill="#2f7b6a" opacity="0.25"/>
    <circle cx="170" cy="1070" r="230" fill="#315b8f" opacity="0.22"/>
    <circle cx="760" cy="1020" r="310" fill="#243a6a" opacity="0.18"/>
  </g>

  <g stroke="#aee7dd" stroke-opacity="0.22" stroke-width="2" fill="none">
    <path d="M45 228 C230 142 350 300 525 228 S835 120 1028 230"/>
    <path d="M28 945 C240 850 338 1010 520 932 S840 810 1042 958"/>
    <path d="M116 500 C260 440 390 560 540 500 S806 420 948 512"/>
  </g>

  <g opacity="0.72">
    <circle cx="126" cy="160" r="4" fill="#fff5bd"/>
    <circle cx="214" cy="240" r="3" fill="#aef8ff"/>
    <circle cx="938" cy="364" r="5" fill="#fff5bd"/>
    <circle cx="812" cy="116" r="3" fill="#aef8ff"/>
    <circle cx="140" cy="814" r="5" fill="#fff5bd"/>
    <circle cx="936" cy="866" r="3" fill="#aef8ff"/>
    <circle cx="640" cy="1210" r="4" fill="#fff5bd"/>
  </g>

  <g transform="translate(84 48)">
    <rect x="0" y="0" width="270" height="54" rx="27" fill="#f9d56e"/>
    <text x="135" y="36" text-anchor="middle" class="zh mono" font-size="24" font-weight="700" fill="#172b3b">AI ONLINE WORKSHOP</text>
  </g>

  <g transform="translate(88 176)">
    <text class="zh cream" font-size="83" font-weight="900" letter-spacing="0">
      <tspan x="0" y="0">Vibe coding</tspan>
    </text>
    <text class="zh accent" font-size="73" font-weight="900" letter-spacing="0">
      <tspan x="0" y="86">+ 動態題庫</tspan>
    </text>
    <rect x="0" y="120" width="474" height="5" rx="2.5" fill="#72e0c3"/>
    <text class="zh cream" x="0" y="182" font-size="44" font-weight="800">AI 線上工作坊</text>
  </g>

  <g transform="translate(642 142)" filter="url(#softShadow)">
    <circle cx="190" cy="190" r="154" fill="url(#portal)" opacity="0.95"/>
    <circle cx="190" cy="190" r="116" fill="#12324b"/>
    <path d="M72 217 C98 160 128 119 190 79 C252 119 282 160 308 217 C272 195 226 200 190 238 C154 200 108 195 72 217Z" fill="#f9d56e"/>
    <path d="M118 264 C145 222 169 210 190 238 C211 210 235 222 262 264 C214 248 166 248 118 264Z" fill="#72e0c3"/>
    <rect x="132" y="126" width="116" height="72" rx="10" fill="#fff5da"/>
    <text x="190" y="155" text-anchor="middle" class="mono" font-size="23" font-weight="800" fill="#1b3246">&lt;/&gt;</text>
    <text x="190" y="184" text-anchor="middle" class="zh" font-size="20" font-weight="800" fill="#1b3246">QUIZ</text>
  </g>

  <g transform="translate(82 445)" filter="url(#softShadow)">
    <rect width="916" height="426" rx="28" fill="url(#panel)"/>
    <path d="M0 70 H916" stroke="#e5bd68" stroke-width="2"/>
    <circle cx="44" cy="36" r="10" fill="#ff725e"/>
    <circle cx="78" cy="36" r="10" fill="#f4c24f"/>
    <circle cx="112" cy="36" r="10" fill="#59c986"/>
    <text x="54" y="121" class="zh ink body" font-weight="700">
      <tspan x="54" dy="0">在人人都能編程的年代，</tspan>
      <tspan x="54" dy="58">學會 AI 寫程式好像已經是常態。</tspan>
      <tspan x="54" dy="78">但是使用 AI 最重要從來不是</tspan>
      <tspan x="54" dy="58">你會不會，而是你能用它做什麼？</tspan>
    </text>
    <g transform="translate(650 118)">
      <rect x="0" y="0" width="178" height="172" rx="16" fill="#183047"/>
      <text x="22" y="42" class="mono" font-size="22" fill="#72e0c3">if quiz:</text>
      <text x="22" y="80" class="mono" font-size="22" fill="#fff5bd">  play()</text>
      <text x="22" y="118" class="mono" font-size="22" fill="#ffb36b">score += 1</text>
      <circle cx="146" cy="135" r="20" fill="#72e0c3"/>
      <path d="M138 135 l7 8 l15 -20" fill="none" stroke="#183047" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g transform="translate(84 884)">
    <rect width="912" height="240" rx="28" fill="#f8fbff" opacity="0.94" filter="url(#softShadow)"/>
    <text x="52" y="66" class="zh ink" font-size="34" font-weight="900">這堂課 YOYO 將教你</text>
    <g class="zh" font-size="30" font-weight="800" fill="#183047">
      <g transform="translate(52 102)">
        <rect width="35" height="35" rx="8" fill="#69d4bd"/>
        <text x="52" y="29">動態題庫的使用與遊戲化概念</text>
      </g>
      <g transform="translate(52 154)">
        <rect width="35" height="35" rx="8" fill="#f9d56e"/>
        <text x="52" y="29">把評量變成各種好玩的遊戲</text>
      </g>
      <g transform="translate(52 206)">
        <rect width="35" height="35" rx="8" fill="#ff9b72"/>
        <text x="52" y="29">用 AI 寫程式，跨出一點舒適圈</text>
      </g>
    </g>
  </g>

  <g transform="translate(88 1160)">
    <text class="zh cream" font-size="31" font-weight="800">
      <tspan x="0" y="0">結合遊戲化概念與技巧，</tspan>
      <tspan x="0" y="46">讓作業與考卷不只是一張紙，</tspan>
      <tspan x="0" y="92" fill="#fff0b8">而是施滿魔法的各種奇幻世界。</tspan>
    </text>
  </g>

  <g transform="translate(820 1136) scale(0.78)" filter="url(#glow)">
    <path d="M74 20 L89 67 L138 68 L98 96 L113 143 L74 114 L35 143 L50 96 L10 68 L59 67 Z" fill="#f9d56e"/>
    <path d="M74 50 L81 73 L105 74 L86 88 L93 111 L74 97 L55 111 L62 88 L43 74 L67 73 Z" fill="#fff5da"/>
  </g>
</svg>
